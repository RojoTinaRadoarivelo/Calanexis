name: Deploy calanexis

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install backend
        run: |
          cd back-end
          npm ci

      - name: Install frontend
        run: |
          cd front-end
          npm ci

      - name: Prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres?schema=public
        run: |
          cd back-end
          npx prisma generate

      - name: Build backend
        run: |
          cd back-end
          npm run build

      - name: Build frontend
        run: |
          cd front-end
          npm run build

  deploy_backend:
    needs: ci
    if: contains(github.event.head_commit.message, 'backend') || contains(join(github.event.commits.*.modified, ','), 'back-end/') && (github.event_name == 'pull_request' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      IMAGE_NAME: ${{ secrets.DOCKER_IMAGE_NAME }} # ex: username/mediatheque-images-back
      IMAGE_TAG: ${{ github.sha }}
      LATEST_TAG: latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required Docker settings
        run: |
          if [ -z "${IMAGE_NAME}" ]; then
            echo "Missing secret DOCKER_IMAGE_NAME"
            exit 1
          fi
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "Missing secret DOCKERHUB_USERNAME"
            exit 1
          fi
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "Missing secret DOCKERHUB_TOKEN"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.image
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:${{ env.LATEST_TAG }}

      - name: Trigger Render deploy hook (optional)
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
          RENDER_IMAGE_URL: docker.io/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
        run: |
          if [ -n "${RENDER_DEPLOY_HOOK}" ]; then
            if [[ "${RENDER_DEPLOY_HOOK}" == *\?* ]]; then
              HOOK_URL="${RENDER_DEPLOY_HOOK}&imgURL=${RENDER_IMAGE_URL}"
            else
              HOOK_URL="${RENDER_DEPLOY_HOOK}?imgURL=${RENDER_IMAGE_URL}"
            fi
            curl --fail-with-body -X POST "${HOOK_URL}"
          else
            echo "RENDER_DEPLOY_HOOK is empty; skipping Render deploy hook trigger."
          fi

  frontend_deploy:
    needs: ci
    if: contains(github.event.head_commit.message, 'frontend') || contains(join(github.event.commits.*.modified, ','), 'front-end/') && (github.event_name == 'pull_request' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'))
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VITE_API_URL: ${{ secrets.VITE_API_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          cd front-end
          npm ci

      - name: Generate environment config
        run: |
          cd front-end
          mkdir -p src/environment
          cat > src/environment/env.ts << 'ENVFILE'
          export const ENV = {
              API_URL: import.meta.env.VITE_API_URL ?? "http://localhost:3002/api/v1",
          };
          ENVFILE

      - name: Build check
        run: |
          cd front-end
          npm run build

      # Deploy vers Vercel (sur push ET sur PR vers master/main)
      - name: Deploy to Vercel
        run: |
          cd front-end
          npm install --global vercel
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
